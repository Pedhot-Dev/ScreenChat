name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MinGW (x86)
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x86
          version: 12.2.0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_CXX_FLAGS="-include algorithm -include cstdio -include cstdarg -include stdexcept"

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release -- -j2

      - name: Prepare release package
        shell: bash
        run: |
          mkdir -p release

          # Copy final ASI plugin
          cp build/ScreenChat.asi release/ScreenChat.asi

          # Optional extra files
          [ -f README.md ] && cp README.md release/
          [ -f LICENSE ] && cp LICENSE release/

          cd release
          powershell -Command "Compress-Archive -Path * -DestinationPath ../ScreenChat-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScreenChat-${{ github.ref_name }}.zip
          generate_release_notes: true